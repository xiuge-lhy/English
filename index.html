        // ************************ 全局变量与功能逻辑（无需修改） ************************
        const wordList = document.getElementById('word-list');
        const searchInput = document.getElementById('search-input');
        const filterSelect = document.getElementById('filter-select');
        const noResult = document.getElementById('no-result');
        const datePicker = document.getElementById('date-picker');
        const markTodayBtn = document.getElementById('mark-today');
        const markTip = document.getElementById('mark-tip');
        const markedIndex = document.getElementById('marked-index');
        const todayDateEl = document.getElementById('today-date');
        const collapsePanelBtn = document.getElementById('collapse-panel');
        let currentWords = [...wordData];
        let scrollPositionMap = {}; // 存储日期-背诵位置映射
        const today = new Date().toISOString().split('T')[0]; // 今日日期（YYYY-MM-DD）

        // 初始化今日日期显示
        todayDateEl.textContent = formatDate(today);

        // 日期格式化（YYYY-MM-DD → 年月日）
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
        }

        // 从localStorage加载背诵标记
        function loadScrollPositions() {
            const saved = localStorage.getItem('wordScrollPositions');
            scrollPositionMap = saved ? JSON.parse(saved) : {};
            // 日期选择器默认选中今日
            datePicker.value = today;
        }

        // 保存背诵标记到localStorage
        function saveScrollPosition(date, index) {
            scrollPositionMap[date] = index;
            localStorage.setItem('wordScrollPositions', JSON.stringify(scrollPositionMap));
        }

        // 单词发音
        const speakWord = (word) => {
            if (!window.speechSynthesis) {
                alert("你的浏览器不支持语音发音功能，请更换Chrome/Edge/Firefox浏览器");
                return;
            }
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            speechSynthesis.speak(utterance);
        };

        // 渲染单词列表
        const renderWords = (words) => {
            wordList.innerHTML = '';
            if (words.length === 0) {
                wordList.classList.add('hidden');
                noResult.classList.remove('hidden');
                return;
            }
            wordList.classList.remove('hidden');
            noResult.classList.add('hidden');
            words.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'bg-card rounded-lg border border-gray-100 p-5 shadow-sm word-card-hover';
                card.dataset.index = index; // 标记单词索引
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-lg word-click" data-word="${item.word}">${item.word}</h3>
                        <span class="freq-tag">考频${item.frequency}</span>
                    </div>
                    <p class="phonetic-text mb-3">${item.phonetic}</p>
                    <p class="text-gray-700">${item.meaning}</p>
                `;
                card.querySelector('.word-click').addEventListener('click', (e) => {
                    speakWord(e.target.dataset.word);
                });
                wordList.appendChild(card);
            });
            // 渲染后恢复对应日期的滚动位置
            const targetIndex = scrollPositionMap[datePicker.value];
            if (targetIndex !== undefined && targetIndex < words.length) {
                const targetCard = wordList.querySelector(`[data-index="${targetIndex}"]`);
                targetCard?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // 高亮标记的单词
                targetCard?.classList.add('border-accent', 'shadow-accent/20');
            }
        };

        // 考频筛选
        const filterByFreq = (type) => {
            if (type === 'default') {
                currentWords = [...wordData];
            } else if (type === 'asc') {
                currentWords.sort((a, b) => a.frequency - b.frequency);
            } else {
                currentWords.sort((a, b) => b.frequency - a.frequency);
            }
            renderWords(currentWords);
        };

        // 中英文搜索
        const searchWords = (keyword) => {
            if (!keyword) {
                currentWords = [...wordData];
                filterByFreq(filterSelect.value);
                return;
            }
            const lowerKey = keyword.toLowerCase();
            currentWords = wordData.filter(item => 
                item.word.toLowerCase().includes(lowerKey) || 
                item.meaning.includes(keyword)
            );
            renderWords(currentWords);
        };

        // 标记今日背诵位置
        const markCurrentPosition = () => {
            if (currentWords.length === 0) {
                alert("暂无单词可标记，请先添加单词数据");
                return;
            }
            // 获取当前可视区域第一个单词的索引
            const cards = wordList.querySelectorAll('[data-index]');
            let currentIndex = 0;
            for (let card of cards) {
                const rect = card.getBoundingClientRect();
                if (rect.top >= 0 && rect.bottom <= window.innerHeight) {
                    currentIndex = parseInt(card.dataset.index);
                    break;
                }
            }
            // 保存标记
            saveScrollPosition(today, currentIndex);
            // 显示提示
            markedIndex.textContent = currentIndex + 1; // 索引从1开始显示
            markTip.classList.remove('hidden');
            // 高亮当前标记的单词
            cards.forEach(card => card.classList.remove('border-accent', 'shadow-accent/20'));
            cards[currentIndex]?.classList.add('border-accent', 'shadow-accent/20');
        };

        // 日期选择器跳转
        const handleDateChange = (e) => {
            const selectedDate = e.target.value;
            if (!selectedDate) return;
            filterByFreq(filterSelect.value); // 重新渲染列表
        };

        // 手机端折叠/展开标记面板
        const togglePanel = () => {
            const panel = document.querySelector('.bg-card.p-3.rounded-lg');
            panel.classList.toggle('hidden');
            const icon = collapsePanelBtn.querySelector('i');
            icon.classList.toggle('fa-chevron-up');
            icon.classList.toggle('fa-chevron-down');
        };

        // 事件监听
        window.onload = () => {
            loadScrollPositions();
            filterByFreq('default');
        };

        filterSelect.addEventListener('change', (e) => {
            filterByFreq(e.target.value);
        });

        searchInput.addEventListener('input', (e) => {
            searchWords(e.target.value.trim());
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.target.blur();
            }
        });

        datePicker.addEventListener('change', handleDateChange);

        markTodayBtn.addEventListener('click', markCurrentPosition);

        collapsePanelBtn.addEventListener('click', togglePanel);

        window.onbeforeunload = () => {
            speechSynthesis.cancel();
        };
    </script>
</body>
</html>
